name: PIB Daily Press Release Digest

on:
  schedule:
    # Runs at 7:00 AM IST every day
    # GitHub uses UTC — IST is UTC+5:30, so 7:00 AM IST = 1:30 AM UTC
    - cron: '30 1 * * *'

  # Trigger manually from GitHub website anytime
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '22'

      - name: Install Python packages
        run: pip install requests beautifulsoup4

      - name: Install Node packages
        run: npm install docx

      - name: Run PIB scraper (attempt 1)
        id: attempt1
        run: python pib_scraper.py
        continue-on-error: true

      - name: Run PIB scraper (attempt 2 — retry if attempt 1 failed)
        if: steps.attempt1.outcome == 'failure'
        id: attempt2
        run: |
          echo "Attempt 1 failed, waiting 60s before retry..."
          sleep 60
          python pib_scraper.py

      - name: Send digest by email
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "PIB Press Release Digest — ${{ env.DIGEST_DATE }}"
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: "PIB Digest <${{ secrets.GMAIL_ADDRESS }}>"
          body: |
            Hello,

            Please find attached today's PIB Press Release Digest.

            This is an automated email generated from pib.gov.in.

            — PIB Digest Bot
          attachments: output/*.docx

      - name: Save digest as artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: PIB-Digest-${{ github.run_number }}
          path: output/*.docx
          retention-days: 30
